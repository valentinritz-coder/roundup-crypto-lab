name: Update stop callback fixtures
on:
  push:
    branches: [agent/freqtrade-stop-callback-order]
    paths: [.github/workflows/update-stop-tests.yml]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/freqtrade-stop-callback-order
      - run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/test_active_backtests.py')
          text = path.read_text()
          old = '''def ohlc(day: int, open_: str, high: str, low: str, close: str, atr: str | None = None) -> Candle:\n    return Candle(\n        at(day),\n        Decimal(open_),\n        Decimal(close),\n        Decimal(high),\n        Decimal(low),\n        None if atr is None else Decimal(atr),\n    )\n'''
          new = '''def ohlc(day: int, open_: str, high: str, low: str, close: str, atr: str | None = None) -> Candle:\n    parsed_atr = None if atr is None else Decimal(atr)\n    return Candle(\n        at(day),\n        Decimal(open_),\n        Decimal(close),\n        Decimal(high),\n        Decimal(low),\n        parsed_atr,\n        parsed_atr,\n    )\n'''
          if old not in text:
              raise SystemExit('ohlc helper not found')
          text = text.replace(old, new)
          text = text.replace(
              '            "atr": Decimal("5"),\n            "candidate_stop_price": Decimal("100"),',
              '            "atr": Decimal("5"),\n            "after_fill": True,\n            "candidate_stop_price": Decimal("100"),',
          )
          text = text.replace(
              '                Decimal("1403.500308265872"),\n            )',
              '                Decimal("1403.500308265872"),\n                Decimal("1403.500308265872"),\n            )',
          )
          path.write_text(text)
          PY
          rm -f pytest-failure.txt
          rm .github/workflows/update-stop-tests.yml
          rm -f .github/workflows/capture-pytest-failure.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m 'Update custom stop callback fixtures'
          git push origin HEAD:agent/freqtrade-stop-callback-order