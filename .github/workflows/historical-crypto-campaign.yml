name: Historical crypto campaign
on:
  workflow_dispatch:
permissions: {contents: read}
concurrency: {group: historical-crypto-campaign, cancel-in-progress: false}
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: '${{ steps.matrix.outputs.matrix }}'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12', cache: pip, cache-dependency-path: pyproject.toml}
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Validate registry and build matrix
        id: matrix
        run: |
          python -m roundup_crypto_lab.historical_scenarios --output artifacts/canonical-registry.json
          python -m roundup_crypto_lab.historical_campaign matrix --output artifacts/campaign-matrix.json
          python -c 'import json; payload=json.load(open("artifacts/campaign-matrix.json")); print("matrix=" + json.dumps({"include": payload["include"]}, separators=(",", ":")))' >> "$GITHUB_OUTPUT"
          cat artifacts/canonical-registry.json >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: 'historical-campaign-inputs-${{ github.run_id }}'
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

  compare:
    needs: prepare
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: '${{ fromJSON(needs.prepare.outputs.matrix) }}'
    uses: ./.github/workflows/all-strategy-comparison.yml
    with:
      timerange: '${{ matrix.timerange }}'
      timeframe: '${{ matrix.timeframe }}'
      pair: '${{ matrix.pair }}'
      capital_mode: '${{ matrix.capital_mode }}'
      initial_capital: '${{ matrix.initial_capital }}'
      monthly_budget: '${{ matrix.monthly_budget }}'
      contribution_day: '${{ matrix.contribution_day }}'
      fee_ratio: '${{ matrix.fee_ratio }}'
      scenario_id: '${{ matrix.scenario_id }}'
      registry_id: '${{ matrix.registry_id }}'
      artifact_name: '${{ matrix.artifact_name }}'

  summarize:
    if: always()
    needs: [prepare, compare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12', cache: pip, cache-dependency-path: pyproject.toml}
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Download scenario artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: 'historical-scenario-*-${{ github.run_id }}'
          path: downloaded-scenarios
      - name: Build campaign status summary
        run: |
          python -m roundup_crypto_lab.historical_campaign summary --status-dir downloaded-scenarios --output artifacts/historical-campaign-summary.json --markdown artifacts/historical-campaign-summary.md
          cat artifacts/historical-campaign-summary.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: 'historical-campaign-summary-${{ github.run_id }}'
          path: artifacts/
          if-no-files-found: error
          retention-days: 30
