name: All strategy comparison
on:
  workflow_dispatch:
    inputs:
      timerange: {description: Strict YYYYMMDD-YYYYMMDD timerange, required: true, type: string}
      timeframe: {description: Fixed Freqtrade timeframe, required: true, default: "4h", type: choice, options: ["4h"]}
      pair: {description: Supported single pair, required: true, default: "BTC/EUR", type: choice, options: ["BTC/EUR", "ETH/EUR"]}
      capital_mode: {description: Investor capital mode, required: true, default: "recurring_monthly_contributions", type: choice, options: ["recurring_monthly_contributions", "one_shot_capital"]}
permissions: {contents: read}
concurrency: {group: kraken-ohlcv-pipeline, cancel-in-progress: false}
env: {INITIAL_CAPITAL: '40', MONTHLY_BUDGET: '40', CONTRIBUTION_DAY: '1', FEE: '0.0026', FREQTRADE_VERSION: '2026.6', FREQTRADE_COMMIT: b604e2fd70539f7f73d3c62c16ce0b155bbab319}
jobs:
  compare-all-strategies:
    runs-on: ubuntu-latest
    defaults: {run: {shell: "bash -eo pipefail {0}"}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12', cache: pip, cache-dependency-path: pyproject.toml}
      - name: Install project and pinned Freqtrade
        run: |
          python -m pip install -e '.[dev]'
          git clone --depth 1 --branch "$FREQTRADE_VERSION" https://github.com/freqtrade/freqtrade.git .freqtrade-src
          test "$(git -C .freqtrade-src rev-parse HEAD)" = "$FREQTRADE_COMMIT"
          python -m pip install -r .freqtrade-src/requirements.txt
          python -m pip install --no-deps -e .freqtrade-src
          python -m pip install --no-deps -e .freqtrade-src/ft_client
          python -m pip check
      - name: Restore Kraken cache
        uses: actions/cache/restore@v4
        id: restore-kraken
        with: {path: user_data/data/kraken, key: 'kraken-ohlcv-v1-update-${{ github.run_id }}', restore-keys: kraken-ohlcv-v1-}
      - name: Validate inputs and immutable prepared data
        env: {TIMERANGE: '${{ inputs.timerange }}', TIMEFRAME: '${{ inputs.timeframe }}', PAIR: '${{ inputs.pair }}', CAPITAL_MODE: '${{ inputs.capital_mode }}'}
        run: |
          python -m roundup_crypto_lab.breakout_comparison validate-timerange "$TIMERANGE"
          test "$TIMEFRAME" = 4h
          test "$PAIR" = BTC/EUR || test "$PAIR" = ETH/EUR
          test "$CAPITAL_MODE" = recurring_monthly_contributions || test "$CAPITAL_MODE" = one_shot_capital
          python -c 'from pathlib import Path; from roundup_crypto_lab.freqtrade_differential import generate_single_pair_config; import os; generate_single_pair_config(Path("user_data/config.json"), Path("artifacts/pair-config.json"), os.environ["PAIR"], overrides={"dry_run_wallet": int(os.environ["INITIAL_CAPITAL"]), "fee": float(os.environ["FEE"])})'
          test '${{ steps.restore-kraken.outputs.cache-hit }}' != '' || { echo 'No Kraken cache was restored: run Update Kraken data first.'; exit 1; }
          python -m roundup_crypto_lab.breakout_comparison validate-data "$TIMERANGE" user_data/data/kraken |& tee artifacts-data-validation.txt
          python -m freqtrade list-data --config artifacts/pair-config.json --show-timerange |& tee list-data.txt
      - name: Run fifteen equivalent backtests
        env: {TIMERANGE: '${{ inputs.timerange }}', TIMEFRAME: '${{ inputs.timeframe }}'}
        run: |
          mkdir -p artifacts/results artifacts/logs
          run_backtest() {
            local strategy="$1" result_name="$2"
            rm -f artifacts/results/backtest-result-*.zip
            python -m freqtrade backtesting --cache none --config artifacts/pair-config.json --timeframe "$TIMEFRAME" --timerange "$TIMERANGE" --export trades --backtest-directory artifacts/results --strategy "$strategy" |& tee "artifacts/logs/$result_name.txt"
            mapfile -t zips < <(find artifacts/results -maxdepth 1 -type f -name 'backtest-result-*.zip' -printf '%T@ %p\n' | sort -nr | cut -d' ' -f2-)
            test "${#zips[@]}" -eq 1 || { echo "Expected exactly one newly produced ZIP for $strategy"; exit 1; }
            mv "${zips[0]}" "artifacts/results/$result_name.zip"
            find artifacts/results -maxdepth 1 -type f -name 'backtest-result-*.meta.json' -delete
          }
          run_backtest RoundupBreakoutStrategy breakout-baseline
          run_backtest RoundupBreakoutTrendStrategy breakout-trend
          run_backtest RoundupBreakoutAtrStrategy breakout-atr
          run_backtest RoundupBreakoutAtrVolumeStrategy breakout-atr-volume
          run_backtest RoundupTrendPullbackStrategy trend-pullback
          run_backtest RoundupConfirmedBreakoutStrategy confirmed-breakout
          run_backtest RoundupVolatilitySqueezeStrategy volatility-squeeze
          run_backtest RoundupScientificControlBreakoutStrategy scientific-control-breakout
          run_backtest RoundupRiskAdjustedMomentumStrategy risk-adjusted-momentum
          run_backtest RoundupBullPullbackRsiStrategy bull-pullback-rsi
          run_backtest RoundupDistanceReversionStrategy distance-reversion
          run_backtest RoundupObvConfirmedBreakoutStrategy obv-confirmed-breakout
          run_backtest RoundupTrendQualityKerAdxStrategy trend-quality-ker-adx
          run_backtest RoundupDonchianRetestStrategy donchian-retest
          run_backtest RoundupCapitulationRecoveryStrategy capitulation-recovery
      - name: Generate and validate active results
        env: {TIMERANGE: '${{ inputs.timerange }}', PAIR: '${{ inputs.pair }}', CAPITAL_MODE: '${{ inputs.capital_mode }}'}
        run: |
          for strategy in RoundupBreakoutStrategy RoundupBreakoutTrendStrategy RoundupBreakoutAtrStrategy RoundupBreakoutAtrVolumeStrategy RoundupTrendPullbackStrategy RoundupConfirmedBreakoutStrategy RoundupVolatilitySqueezeStrategy RoundupScientificControlBreakoutStrategy RoundupRiskAdjustedMomentumStrategy RoundupBullPullbackRsiStrategy RoundupDistanceReversionStrategy RoundupObvConfirmedBreakoutStrategy RoundupTrendQualityKerAdxStrategy RoundupDonchianRetestStrategy RoundupCapitulationRecoveryStrategy; do
            python -m roundup_crypto_lab.freqtrade_active --data-file "user_data/data/kraken/${PAIR//\//_}-4h.feather" --pair "$PAIR" --strategy "$strategy" --timerange "$TIMERANGE" --capital-mode "$CAPITAL_MODE" --initial-capital "$INITIAL_CAPITAL" --monthly-budget "$MONTHLY_BUDGET" --contribution-day "$CONTRIBUTION_DAY" --fee "$FEE" --config-file artifacts/pair-config.json --output "artifacts/results/active-$strategy.json"
          done
      - name: Diagnose one-shot native differential
        if: ${{ inputs.capital_mode == 'one_shot_capital' }}
        run: |
          for spec in 'RoundupBreakoutStrategy breakout-baseline' 'RoundupBreakoutTrendStrategy breakout-trend' 'RoundupBreakoutAtrStrategy breakout-atr' 'RoundupBreakoutAtrVolumeStrategy breakout-atr-volume' 'RoundupTrendPullbackStrategy trend-pullback' 'RoundupConfirmedBreakoutStrategy confirmed-breakout' 'RoundupVolatilitySqueezeStrategy volatility-squeeze' 'RoundupScientificControlBreakoutStrategy scientific-control-breakout' 'RoundupRiskAdjustedMomentumStrategy risk-adjusted-momentum' 'RoundupBullPullbackRsiStrategy bull-pullback-rsi' 'RoundupDistanceReversionStrategy distance-reversion' 'RoundupObvConfirmedBreakoutStrategy obv-confirmed-breakout' 'RoundupTrendQualityKerAdxStrategy trend-quality-ker-adx' 'RoundupDonchianRetestStrategy donchian-retest' 'RoundupCapitulationRecoveryStrategy capitulation-recovery'; do
            set -- $spec
            python -m roundup_crypto_lab.one_shot_diagnostic_runner --native-zip "artifacts/results/$2.zip" --active "artifacts/results/active-$1.json" --strategy "$1" --output "artifacts/results/differential-$1.json"
          done
          python -m roundup_crypto_lab.one_shot_diagnostic_runner combine --result artifacts/results/differential-RoundupBreakoutStrategy.json --result artifacts/results/differential-RoundupBreakoutTrendStrategy.json --result artifacts/results/differential-RoundupBreakoutAtrStrategy.json --result artifacts/results/differential-RoundupBreakoutAtrVolumeStrategy.json --result artifacts/results/differential-RoundupTrendPullbackStrategy.json --result artifacts/results/differential-RoundupConfirmedBreakoutStrategy.json --result artifacts/results/differential-RoundupVolatilitySqueezeStrategy.json --result artifacts/results/differential-RoundupScientificControlBreakoutStrategy.json --result artifacts/results/differential-RoundupRiskAdjustedMomentumStrategy.json --result artifacts/results/differential-RoundupBullPullbackRsiStrategy.json --result artifacts/results/differential-RoundupDistanceReversionStrategy.json --result artifacts/results/differential-RoundupObvConfirmedBreakoutStrategy.json --result artifacts/results/differential-RoundupTrendQualityKerAdxStrategy.json --result artifacts/results/differential-RoundupDonchianRetestStrategy.json --result artifacts/results/differential-RoundupCapitulationRecoveryStrategy.json --output artifacts/results/one-shot-differential.json
      - name: Generate, validate, and summarize comparison
        env: {TIMERANGE: '${{ inputs.timerange }}', TIMEFRAME: '${{ inputs.timeframe }}', PAIR: '${{ inputs.pair }}', CAPITAL_MODE: '${{ inputs.capital_mode }}'}
        run: |
          python -m roundup_crypto_lab.compare_strategies --expected-strategy RoundupBreakoutStrategy --expected-strategy RoundupBreakoutTrendStrategy --expected-strategy RoundupBreakoutAtrStrategy --expected-strategy RoundupBreakoutAtrVolumeStrategy --expected-strategy RoundupTrendPullbackStrategy --expected-strategy RoundupConfirmedBreakoutStrategy --expected-strategy RoundupVolatilitySqueezeStrategy --expected-strategy RoundupScientificControlBreakoutStrategy --expected-strategy RoundupRiskAdjustedMomentumStrategy --expected-strategy RoundupBullPullbackRsiStrategy --expected-strategy RoundupDistanceReversionStrategy --expected-strategy RoundupObvConfirmedBreakoutStrategy --expected-strategy RoundupTrendQualityKerAdxStrategy --expected-strategy RoundupDonchianRetestStrategy --expected-strategy RoundupCapitulationRecoveryStrategy --result RoundupBreakoutStrategy=artifacts/results/breakout-baseline.zip --result RoundupBreakoutTrendStrategy=artifacts/results/breakout-trend.zip --result RoundupBreakoutAtrStrategy=artifacts/results/breakout-atr.zip --result RoundupBreakoutAtrVolumeStrategy=artifacts/results/breakout-atr-volume.zip --result RoundupTrendPullbackStrategy=artifacts/results/trend-pullback.zip --result RoundupConfirmedBreakoutStrategy=artifacts/results/confirmed-breakout.zip --result RoundupVolatilitySqueezeStrategy=artifacts/results/volatility-squeeze.zip --result RoundupScientificControlBreakoutStrategy=artifacts/results/scientific-control-breakout.zip --result RoundupRiskAdjustedMomentumStrategy=artifacts/results/risk-adjusted-momentum.zip --result RoundupBullPullbackRsiStrategy=artifacts/results/bull-pullback-rsi.zip --result RoundupDistanceReversionStrategy=artifacts/results/distance-reversion.zip --result RoundupObvConfirmedBreakoutStrategy=artifacts/results/obv-confirmed-breakout.zip --result RoundupTrendQualityKerAdxStrategy=artifacts/results/trend-quality-ker-adx.zip --result RoundupDonchianRetestStrategy=artifacts/results/donchian-retest.zip --result RoundupCapitulationRecoveryStrategy=artifacts/results/capitulation-recovery.zip --output artifacts/results/all-strategies-comparison.json
          CONFIG_DIGEST="$(python -c 'import json; from roundup_crypto_lab.freqtrade_differential import config_digest; print(config_digest(json.load(open("artifacts/pair-config.json"))))')"
          python -m roundup_crypto_lab.all_strategy_comparison artifacts/results/all-strategies-comparison.json artifacts/results/metadata.json artifacts/results/job-summary.md --timerange "$TIMERANGE" --timeframe "$TIMEFRAME" --commit-sha "$GITHUB_SHA" --python-version "$(python --version)" --freqtrade-version "$(python -m freqtrade --version)" --ccxt-version "$(python -c 'import ccxt; print(ccxt.__version__)')" --run-date-utc "$(date --utc +%Y-%m-%dT%H:%M:%SZ)" --config artifacts/pair-config.json --config-digest "$CONFIG_DIGEST" --pairs "$PAIR" --fee "$FEE" --starting-balance "$INITIAL_CAPITAL"
          differential_arg=()
          if [ "$CAPITAL_MODE" = one_shot_capital ]; then differential_arg=(--one-shot-differential artifacts/results/one-shot-differential.json); fi
          python -m roundup_crypto_lab.active_comparison --native-comparison artifacts/results/all-strategies-comparison.json --metadata artifacts/results/metadata.json --active-result artifacts/results/active-RoundupBreakoutStrategy.json --active-result artifacts/results/active-RoundupBreakoutTrendStrategy.json --active-result artifacts/results/active-RoundupBreakoutAtrStrategy.json --active-result artifacts/results/active-RoundupBreakoutAtrVolumeStrategy.json --active-result artifacts/results/active-RoundupTrendPullbackStrategy.json --active-result artifacts/results/active-RoundupConfirmedBreakoutStrategy.json --active-result artifacts/results/active-RoundupVolatilitySqueezeStrategy.json --active-result artifacts/results/active-RoundupScientificControlBreakoutStrategy.json --active-result artifacts/results/active-RoundupRiskAdjustedMomentumStrategy.json --active-result artifacts/results/active-RoundupBullPullbackRsiStrategy.json --active-result artifacts/results/active-RoundupDistanceReversionStrategy.json --active-result artifacts/results/active-RoundupObvConfirmedBreakoutStrategy.json --active-result artifacts/results/active-RoundupTrendQualityKerAdxStrategy.json --active-result artifacts/results/active-RoundupDonchianRetestStrategy.json --active-result artifacts/results/active-RoundupCapitulationRecoveryStrategy.json --output artifacts/results/controlled-comparison.json --summary artifacts/results/job-summary.md "${differential_arg[@]}"
          cat artifacts/results/job-summary.md >> "$GITHUB_STEP_SUMMARY"
      # Diagnostics must survive failures.
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 'all-strategy-comparison-${{ github.run_id }}'
          path: |
            artifacts/
            artifacts-data-validation.txt
            list-data.txt
          if-no-files-found: error
          retention-days: 30
