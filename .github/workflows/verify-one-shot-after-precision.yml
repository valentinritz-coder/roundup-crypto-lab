name: Verify one-shot after precision
on:
  push:
    branches: [main]
    paths: [.github/workflows/verify-one-shot-after-precision.yml]
permissions:
  actions: write
  contents: write
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Dispatch one-shot comparison
        id: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          started="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/all-strategy-comparison.yml/dispatches" \
            --data '{"ref":"main","inputs":{"timerange":"20260123-20260718","timeframe":"4h","pair":"BTC/EUR","capital_mode":"one_shot_capital"}}'
          run_id=""
          for _ in $(seq 1 60); do
            payload="$(curl --fail-with-body \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/all-strategy-comparison.yml/runs?event=workflow_dispatch&branch=main&per_page=20")"
            run_id="$(jq -r --arg started "$started" '.workflow_runs | map(select(.created_at >= $started)) | sort_by(.created_at) | last | .id // empty' <<<"$payload")"
            [ -n "$run_id" ] && break
            sleep 5
          done
          test -n "$run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
      - name: Wait for run and download artifact
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        run: |
          set -euo pipefail
          mkdir -p verification/unpacked
          test -n "$RUN_ID"
          payload=""
          for _ in $(seq 1 240); do
            payload="$(curl --fail-with-body \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID")"
            [ "$(jq -r .status <<<"$payload")" = completed ] && break
            sleep 10
          done
          test "$(jq -r .status <<<"$payload")" = completed
          jq '{id,status,conclusion,html_url,head_sha,created_at,updated_at}' <<<"$payload" > verification/run.json
          artifacts="$(curl --fail-with-body \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts")"
          artifact_id="$(jq -r '.artifacts | sort_by(.created_at) | last | .id // empty' <<<"$artifacts")"
          test -n "$artifact_id"
          curl --fail-with-body --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$artifact_id/zip" \
            --output verification/source-artifact.zip
          unzip -q verification/source-artifact.zip -d verification/unpacked
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: one-shot-verification-${{ github.run_id }}
          path: verification/
          if-no-files-found: error
          retention-days: 30
      - name: Publish diagnostics and remove dispatcher
        if: always()
        run: |
          set -euo pipefail
          mkdir -p /tmp/one-shot-result
          cp verification/run.json /tmp/one-shot-result/run.json
          find verification/unpacked -type f \( -name 'one-shot-differential.json' -o -name 'differential-*.json' -o -name 'job-summary.md' -o -name 'controlled-comparison.json' \) -exec cp {} /tmp/one-shot-result/ \;
          git pull --rebase origin main
          rm .github/workflows/verify-one-shot-after-precision.yml
          rm -rf verification-results/latest
          mkdir -p verification-results/latest
          cp /tmp/one-shot-result/* verification-results/latest/
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "Publish one-shot precision verification"
          git push origin HEAD:main
