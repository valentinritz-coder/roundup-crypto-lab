name: Passive benchmarks
on:
  workflow_dispatch:
    inputs:
      timerange: {description: Strict YYYYMMDD-YYYYMMDD timerange, required: true, type: string}
      timeframe: {description: Fixed timeframe, required: true, default: "4h", type: choice, options: ["4h"]}
      initial_capital: {description: Initial investor capital for every deployment method, required: true, default: "200", type: string}
      monthly_budget: {description: Monthly investor budget for every deployment method, required: true, default: "40", type: string}
      contribution_day: {description: Calendar contribution day (1-31; missing days use month end), required: true, default: "23", type: string}
      fee: {description: Purchase fee ratio, required: true, default: "0.004", type: string}
permissions: {contents: read}
concurrency: {group: kraken-ohlcv-pipeline, cancel-in-progress: false}
jobs:
  benchmarks:
    runs-on: ubuntu-latest
    defaults: {run: {shell: "bash -eo pipefail {0}"}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12', cache: pip, cache-dependency-path: pyproject.toml}
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Restore Kraken cache
        uses: actions/cache/restore@v4
        id: restore-kraken
        with: {path: user_data/data/kraken, key: 'kraken-ohlcv-v1-update-${{ github.run_id }}', restore-keys: kraken-ohlcv-v1-}
      - name: Validate inputs and cache coverage
        env: {TIMERANGE: '${{ inputs.timerange }}', TIMEFRAME: '${{ inputs.timeframe }}'}
        run: |
          test "$TIMEFRAME" = 4h
          test '${{ steps.restore-kraken.outputs.cache-hit }}' != '' || { echo 'No Kraken cache was restored: run Update Kraken data first.'; exit 1; }
          python -c 'from roundup_crypto_lab.passive_benchmarks import parse_timerange; parse_timerange("'"$TIMERANGE"'")'
          mkdir -p artifacts/benchmarks artifacts/logs
      - name: Run passive benchmarks
        env: {TIMERANGE: '${{ inputs.timerange }}', INITIAL_CAPITAL: '${{ inputs.initial_capital }}', MONTHLY_BUDGET: '${{ inputs.monthly_budget }}', CONTRIBUTION_DAY: '${{ inputs.contribution_day }}', FEE: '${{ inputs.fee }}'}
        run: |
          python -m roundup_crypto_lab.passive_benchmarks --data-dir user_data/data/kraken --pairs BTC/EUR ETH/EUR --timeframe 4h --timerange "$TIMERANGE" --initial-capital "$INITIAL_CAPITAL" --monthly-budget "$MONTHLY_BUDGET" --contribution-day "$CONTRIBUTION_DAY" --weekly-day monday --fee "$FEE" --output-json artifacts/benchmarks/passive-benchmarks.json --output-dir artifacts/benchmarks |& tee artifacts/logs/passive-benchmarks.txt
          python -m roundup_crypto_lab.passive_cash_flow_reporting --input artifacts/benchmarks/passive-benchmarks.json --output artifacts/benchmarks/passive-benchmarks.json --output-dir artifacts/benchmarks
          python -c 'import json; data=json.load(open("artifacts/benchmarks/passive-benchmarks.json")); assert data["schema_version"] == "passive-benchmarks/v2"'
      - name: Write Job Summary
        env: {TIMERANGE: '${{ inputs.timerange }}', INITIAL_CAPITAL: '${{ inputs.initial_capital }}', MONTHLY_BUDGET: '${{ inputs.monthly_budget }}', CONTRIBUTION_DAY: '${{ inputs.contribution_day }}', FEE: '${{ inputs.fee }}'}
        run: |
          python - <<'PY' | tee artifacts/benchmarks/job-summary.md >> "$GITHUB_STEP_SUMMARY"
          import json, os, platform
          from datetime import UTC, datetime
          from decimal import Decimal

          data=json.load(open('artifacts/benchmarks/passive-benchmarks.json'))
          generated_at_utc = datetime.now(UTC).isoformat()
          print('# Passive benchmarks\n')
          print(f"- **Timerange:** `{os.environ['TIMERANGE']}`\n- **Timeframe:** `4h`\n- **Fee:** `{os.environ['FEE']}`\n- **Initial capital:** `{os.environ['INITIAL_CAPITAL']}`\n- **Monthly budget:** `{os.environ['MONTHLY_BUDGET']}`\n- **Contribution day:** `{os.environ['CONTRIBUTION_DAY']}`\n- **Commit SHA:** `${{ github.sha }}`\n- **Python:** `{platform.python_version()}`\n- **UTC:** `{generated_at_utc}`\n")
          print('| Benchmark | Pair | Buys | Final value | Profit | TWR | XIRR | Utilization | TWR drawdown | Raw drawdown | Fees |\n| --- | --- | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: |')
          for row in data['benchmarks']:
              metrics = row['cash_flow_metrics']
              xirr = 'N/A' if metrics['money_weighted_return'] is None else f"{Decimal(metrics['money_weighted_return']):.2%}"
              print(f"| {row['benchmark']} | {row['pair']} | {row['number_of_buys']} | {Decimal(metrics['final_value']):.2f} | {Decimal(metrics['profit_abs']):.2f} | {Decimal(metrics['time_weighted_return']):.2%} | {xirr} | {Decimal(metrics['capital_utilization_ratio']):.2%} | {Decimal(metrics['max_drawdown_time_weighted']):.2%} | {Decimal(metrics['max_drawdown_raw_portfolio']):.2%} | {Decimal(metrics['total_fees']):.2f} |")
          print('\nTWR and time-weighted drawdown describe method performance without contribution timing. Final value, profit, and XIRR describe the investor outcome. XIRR uses terminal cash plus asset value net of one exit fee.\n\nThese benchmarks are passive references only and do not establish future profitability.')
          PY
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 'passive-benchmarks-${{ github.run_id }}'
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30
