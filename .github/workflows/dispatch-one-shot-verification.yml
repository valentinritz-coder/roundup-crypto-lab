name: Dispatch one-shot verification
on:
  push:
    branches: [main]
    paths: [.github/workflows/dispatch-one-shot-verification.yml]
permissions:
  actions: write
  contents: read
jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch all-strategy one-shot verification
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/all-strategy-comparison.yml/dispatches \
            --data '{"ref":"main","inputs":{"timerange":"20260123-20260718","timeframe":"4h","pair":"BTC/EUR","capital_mode":"one_shot_capital"}}'
