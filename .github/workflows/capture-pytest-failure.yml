name: Capture pytest failure
on:
  push:
    branches: [agent/freqtrade-stop-callback-order]
    paths: [.github/workflows/capture-pytest-failure.yml]
permissions:
  contents: write
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/freqtrade-stop-callback-order
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install -e '.[dev]'
          pytest -q > pytest-failure.txt 2>&1 || true
          rm .github/workflows/capture-pytest-failure.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Capture pytest failure details'
          git push origin HEAD:agent/freqtrade-stop-callback-order