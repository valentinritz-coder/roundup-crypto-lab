name: Freqtrade validation
on: {workflow_dispatch: {}, pull_request: {}, push: {branches: [main]}}
permissions: {contents: read}
concurrency: {group: kraken-ohlcv-pipeline, cancel-in-progress: false}
env: {FREQTRADE_VERSION: '2026.6', FREQTRADE_COMMIT: b604e2fd70539f7f73d3c62c16ce0b155bbab319}
jobs:
  validate:
    runs-on: ubuntu-latest
    defaults: {run: {shell: "bash -eo pipefail {0}"}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Run static checks and importer tests
        run: |
          python -m pip install -e '.[dev]'
          ruff check .
          pytest
          python - <<'PY'
          import yaml
          from pathlib import Path
          for path in Path('.github/workflows').glob('*.yml'): yaml.safe_load(path.read_text())
          PY
      - uses: actions/cache/restore@v4
        id: restore
        with: {path: user_data/data/kraken, key: 'kraken-ohlcv-v1-validation-${{ github.run_id }}', restore-keys: kraken-ohlcv-v1-}
      - name: Defer market validation only for unseeded pull requests
        if: github.event_name == 'pull_request' && steps.restore.outputs.cache-hit == ''
        run: |
          echo 'No prepared cache: static/importer checks passed; cache-backed market validation is deferred until Seed Kraken data runs on main.'
      - name: Require prepared data outside bootstrap pull requests
        if: github.event_name != 'pull_request' && steps.restore.outputs.cache-hit == ''
        run: |-
          echo 'No prepared cache: run Seed Kraken data first.'; exit 1
      - name: Install pinned Freqtrade
        if: steps.restore.outputs.cache-hit != ''
        run: |
          git clone --depth 1 --branch "$FREQTRADE_VERSION" https://github.com/freqtrade/freqtrade.git .freqtrade-src
          test "$(git -C .freqtrade-src rev-parse HEAD)" = "$FREQTRADE_COMMIT"
          python -m pip install -r .freqtrade-src/requirements.txt
          python -m pip install --no-deps -e .freqtrade-src
          python -m pip install --no-deps -e .freqtrade-src/ft_client
          python -m pip check
      - name: Verify data and calculate common-overlap timerange
        if: steps.restore.outputs.cache-hit != ''
        run: |
          mkdir -p artifacts/logs artifacts/results
          python -c 'from pathlib import Path; from roundup_crypto_lab.kraken_ohlcv import common_timerange; print(common_timerange(Path("user_data/data/kraken")))' | tee artifacts/timerange.txt
          freqtrade list-data --config user_data/config.json --show-timerange |& tee artifacts/logs/list-data.txt
      - name: Validate and analyze explicit timerange
        if: steps.restore.outputs.cache-hit != ''
        run: |
          TIMERANGE=$(tail -1 artifacts/timerange.txt)
          freqtrade list-strategies --config user_data/config.json |& tee artifacts/logs/list-strategies.txt
          freqtrade show-config --config user_data/config.json |& tee artifacts/logs/show-config.txt
          freqtrade backtesting --config user_data/config.json --strategy RoundupBreakoutStrategy --timeframe 4h --timerange "$TIMERANGE" --export trades --export-directory artifacts/results |& tee artifacts/logs/backtest.txt
          find artifacts/results -type f -name 'backtest-result*' -print | tee artifacts/results/generated-backtest-files.txt
          test -s artifacts/results/generated-backtest-files.txt
          freqtrade lookahead-analysis --config user_data/config.json --strategy RoundupBreakoutStrategy --timeframe 4h --timerange "$TIMERANGE" --minimum-trade-amount 1 --targeted-trade-amount 10 --lookahead-analysis-exportfilename artifacts/results/lookahead.csv |& tee artifacts/logs/lookahead.txt
          freqtrade recursive-analysis --config user_data/config.json --strategy RoundupBreakoutStrategy --timeframe 4h --timerange "$TIMERANGE" --startup-candle 120 240 480 |& tee artifacts/logs/recursive.txt
      - name: Dry-run startup smoke test
        if: steps.restore.outputs.cache-hit != ''
        run: |
          set +e
          timeout --signal=INT --kill-after=15s 90s freqtrade trade --config user_data/config.json --strategy RoundupBreakoutStrategy --db-url sqlite:///artifacts/results/smoke.sqlite > artifacts/logs/smoke.txt 2>&1
          code=$?
          set -e
          if [ "$code" -ne 124 ] && [ "$code" -ne 130 ]; then cat artifacts/logs/smoke.txt; exit "$code"; fi
          if ! grep -Eq 'Changing state.*RUNNING' artifacts/logs/smoke.txt; then cat artifacts/logs/smoke.txt; echo 'Dry-run smoke test did not reach RUNNING.'; exit 1; fi
      - if: always()
        uses: actions/upload-artifact@v4
        with: {name: 'freqtrade-validation-${{ github.run_id }}', path: artifacts/, if-no-files-found: warn, retention-days: 30}
# CCXT's non-fatal unclosed-connector warning is retained in logs as upstream behavior.
