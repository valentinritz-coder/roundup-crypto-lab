name: Fix native precision fixture once
on:
  push:
    branches: [fix/freqtrade-stop-ratio-and-precision]
    paths:
      - tools/fix_native_precision_fixture.py
      - .github/workflows/fix-native-precision-fixture.yml
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/freqtrade-stop-ratio-and-precision
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python tools/fix_native_precision_fixture.py
      - run: |
          rm tools/fix_native_precision_fixture.py
          rm .github/workflows/fix-native-precision-fixture.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "Use Kraken amount precision in native fixture"
          git push origin HEAD:fix/freqtrade-stop-ratio-and-precision
