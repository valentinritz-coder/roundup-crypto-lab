name: Apply stop callback ordering fix
on:
  push:
    branches: [agent/freqtrade-stop-callback-order]
    paths: [.github/workflows/apply-stop-callback-order-fix.yml]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/freqtrade-stop-callback-order
      - name: Apply targeted patch
        run: |
          python - <<'PY'
          from pathlib import Path

          active = Path('src/roundup_crypto_lab/active_backtests.py')
          text = active.read_text()
          text = text.replace(
              '    atr: Decimal | None = None\n\n    def __post_init__(self) -> None:\n',
              '    atr: Decimal | None = None\n    after_fill_atr: Decimal | None = None\n\n    def __post_init__(self) -> None:\n',
          )
          text = text.replace(
              '        if self.atr is not None and self.atr <= 0:\n            raise ValueError("ATR must be positive")\n',
              '        if self.atr is not None and self.atr <= 0:\n            raise ValueError("ATR must be positive")\n        if self.after_fill_atr is not None and self.after_fill_atr <= 0:\n            raise ValueError("after-fill ATR must be positive")\n',
          )
          old = '''    def update_custom_stop(candle: Candle) -> None:\n        nonlocal stop_price\n        if (\n            not quantity\n            or not lifecycle.use_custom_stoploss\n            or candle.atr is None\n            or open_trade is None\n        ):\n            return\n        current_rate = candle.high or candle.open\n        raw_candidate = current_rate - lifecycle.atr_stop_multiplier * candle.atr  # type: ignore[operator]\n        candidate = _round_up(raw_candidate, lifecycle.price_tick)\n        previous = stop_price\n        stop_price = max(stop_price or candidate, candidate)\n        updates = open_trade.setdefault("stop_updates", [])\n        assert isinstance(updates, list)\n        updates.append(\n            {\n                "timestamp": candle.timestamp.astimezone(UTC).isoformat(),\n                "current_rate": current_rate,\n                "atr": candle.atr,\n                "candidate_stop_price": candidate,\n                "stop_price_before": previous,\n                "stop_price_after": stop_price,\n            }\n        )\n'''
          new = '''    def update_custom_stop(candle: Candle, *, after_fill: bool = False) -> None:\n        nonlocal stop_price\n        atr = candle.after_fill_atr if after_fill else candle.atr\n        if (\n            not quantity\n            or not lifecycle.use_custom_stoploss\n            or atr is None\n            or open_trade is None\n        ):\n            return\n        current_rate = candle.high or candle.open\n        raw_candidate = current_rate - lifecycle.atr_stop_multiplier * atr  # type: ignore[operator]\n        candidate = _round_up(raw_candidate, lifecycle.price_tick)\n        previous = stop_price\n        stop_price = max(stop_price or candidate, candidate)\n        updates = open_trade.setdefault("stop_updates", [])\n        assert isinstance(updates, list)\n        updates.append(\n            {\n                "timestamp": candle.timestamp.astimezone(UTC).isoformat(),\n                "current_rate": current_rate,\n                "atr": atr,\n                "after_fill": after_fill,\n                "candidate_stop_price": candidate,\n                "stop_price_before": previous,\n                "stop_price_after": stop_price,\n            }\n        )\n'''
          if old not in text:
              raise SystemExit('update_custom_stop block not found')
          text = text.replace(old, new)
          old = '''        update_custom_stop(candle)\n        decision = decide(WalletState(timestamp, cash, quantity, quantity > 0))\n        if not isinstance(decision, StrategyDecision):\n            raise ValueError("strategy decision provider must return StrategyDecision")\n        low = candle.low or candle.open\n        if quantity and stop_price is not None and (candle.open <= stop_price or low <= stop_price):\n            close_trade(\n                candle, candle.open if candle.open <= stop_price else stop_price, "stop_loss"\n            )\n        elif decision.action is Action.SELL:\n            if not quantity:\n                raise ValueError("cannot sell without an open position")\n            if lifecycle.use_exit_signal:\n                close_trade(candle, candle.open, "exit_signal", decision.exit_tag)\n        elif decision.action is Action.BUY:\n'''
          new = '''        decision = decide(WalletState(timestamp, cash, quantity, quantity > 0))\n        if not isinstance(decision, StrategyDecision):\n            raise ValueError("strategy decision provider must return StrategyDecision")\n        low = candle.low or candle.open\n        if quantity and stop_price is not None and (candle.open <= stop_price or low <= stop_price):\n            close_trade(\n                candle, candle.open if candle.open <= stop_price else stop_price, "stop_loss"\n            )\n        elif quantity:\n            previous_stop = stop_price\n            update_custom_stop(candle)\n            if stop_price is not None and stop_price != previous_stop and low <= stop_price:\n                close_trade(candle, stop_price, "stop_loss")\n            elif decision.action is Action.SELL and lifecycle.use_exit_signal:\n                close_trade(candle, candle.open, "exit_signal", decision.exit_tag)\n            elif decision.action is Action.BUY:\n                raise ValueError("maximum one open position")\n        elif decision.action is Action.SELL:\n            raise ValueError("cannot sell without an open position")\n        elif decision.action is Action.BUY:\n'''
          if old not in text:
              raise SystemExit('execution ordering block not found')
          text = text.replace(old, new)
          text = text.replace('            update_custom_stop(candle)\n            if low <= stop_price:\n', '            update_custom_stop(candle, after_fill=True)\n            if low <= stop_price:\n')
          active.write_text(text)

          bridge = Path('src/roundup_crypto_lab/freqtrade_active.py')
          text = bridge.read_text()
          old = '''            visible_atr = analyzed.iloc[index - 1].get("atr_14") if index else None\n            atr = None if pd.isna(visible_atr) else Decimal(str(visible_atr))\n            candles.append(\n                Candle(\n                    timestamp,\n                    Decimal(str(row.open)),\n                    Decimal(str(row.close)),\n                    Decimal(str(row.high)),\n                    Decimal(str(row.low)),\n                    atr,\n                )\n            )\n'''
          new = '''            visible_atr = analyzed.iloc[index - 1].get("atr_14") if index else None\n            atr = None if pd.isna(visible_atr) else Decimal(str(visible_atr))\n            current_atr = getattr(row, "atr_14", None)\n            after_fill_atr = None if pd.isna(current_atr) else Decimal(str(current_atr))\n            candles.append(\n                Candle(\n                    timestamp,\n                    Decimal(str(row.open)),\n                    Decimal(str(row.close)),\n                    Decimal(str(row.high)),\n                    Decimal(str(row.low)),\n                    atr,\n                    after_fill_atr,\n                )\n            )\n'''
          if old not in text:
              raise SystemExit('candle ATR block not found')
          bridge.write_text(text.replace(old, new))

          test = Path('tests/test_stop_callback_order.py')
          test.write_text('''from datetime import UTC, datetime, timedelta\nfrom decimal import Decimal\n\nfrom roundup_crypto_lab.active_backtests import (\n    Action, Candle, CapitalMode, LifecycleSettings, StrategyDecision, run_active_backtest,\n)\nfrom roundup_crypto_lab.investment_plan import InvestmentPlan\n\n\ndef _plan():\n    return InvestmentPlan("40", "40", "0.0026", 1)\n\n\ndef test_after_fill_uses_current_candle_atr():\n    start = datetime(2026, 1, 1, tzinfo=UTC)\n    candle = Candle(start, Decimal("100"), Decimal("98"), Decimal("110"), Decimal("90"), Decimal("2"), Decimal("5"))\n    result = run_active_backtest(\n        [candle], _plan(), start, start + timedelta(hours=4),\n        lambda _: StrategyDecision(Action.BUY, Decimal("32")),\n        mode=CapitalMode.ONE_SHOT_CAPITAL,\n        lifecycle=LifecycleSettings(Decimal("-0.12"), True, Decimal("2"), True, Decimal("0.1"), Decimal("0.00000001")),\n    )\n    trade = result["trades"][0]\n    assert trade["stop_updates"][0]["atr"] == Decimal("5")\n    assert trade["stop_updates"][0]["candidate_stop_price"] == Decimal("100.0")\n\n\ndef test_newly_tightened_stop_fills_at_stop_not_candle_open():\n    start = datetime(2026, 1, 1, tzinfo=UTC)\n    candles = [\n        Candle(start, Decimal("100"), Decimal("105"), Decimal("106"), Decimal("99"), Decimal("3"), Decimal("3")),\n        Candle(start + timedelta(hours=4), Decimal("101"), Decimal("103"), Decimal("110"), Decimal("100"), Decimal("2"), Decimal("2")),\n    ]\n    calls = iter([StrategyDecision(Action.BUY, Decimal("32")), StrategyDecision()])\n    result = run_active_backtest(\n        candles, _plan(), start, start + timedelta(hours=8), lambda _: next(calls),\n        mode=CapitalMode.ONE_SHOT_CAPITAL,\n        lifecycle=LifecycleSettings(Decimal("-0.12"), True, Decimal("2"), True, Decimal("0.1"), Decimal("0.00000001")),\n    )\n    trade = result["trades"][0]\n    assert trade["exit_price"] == Decimal("106.0")\n''')
          PY
          rm .github/workflows/apply-stop-callback-order-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m 'Match Freqtrade custom stop callback ordering'
          git push origin HEAD:agent/freqtrade-stop-callback-order