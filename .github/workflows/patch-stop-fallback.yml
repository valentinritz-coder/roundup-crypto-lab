name: Patch after-fill ATR fallback
on:
  push:
    branches: [main]
    paths: [.github/workflows/patch-stop-fallback.yml]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/freqtrade-stop-callback-order
      - name: Patch branch
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/roundup_crypto_lab/active_backtests.py')
          text = path.read_text()
          old = '        atr = candle.after_fill_atr if after_fill else candle.atr\n'
          new = '        atr = (candle.after_fill_atr or candle.atr) if after_fill else candle.atr\n'
          if old not in text:
              raise SystemExit('ATR selection line not found')
          path.write_text(text.replace(old, new))
          PY
          rm -f .github/workflows/capture-pytest-failure.yml
          rm -f .github/workflows/update-stop-tests.yml
          rm -f pytest-failure.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m 'Preserve after-fill ATR compatibility'
          git push origin HEAD:agent/freqtrade-stop-callback-order
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Remove dispatcher
        run: |
          rm .github/workflows/patch-stop-fallback.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Remove stop fallback dispatcher'
          git push origin HEAD:main