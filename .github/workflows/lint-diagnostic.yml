name: Lint diagnostic
on: [pull_request]
permissions: {contents: read}
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python -m pip install -e '.[dev]'
      - name: Apply Ruff in disposable workspace
        run: |
          python -m ruff check --fix .
          python -m ruff format .
          mkdir -p formatted/src/roundup_crypto_lab formatted/tests
          cp src/roundup_crypto_lab/active_builder.py formatted/src/roundup_crypto_lab/
          cp src/roundup_crypto_lab/active_curve.py formatted/src/roundup_crypto_lab/
          cp src/roundup_crypto_lab/active_reporting.py formatted/src/roundup_crypto_lab/
          cp src/roundup_crypto_lab/one_shot_differential.py formatted/src/roundup_crypto_lab/
          cp tests/test_active_workflow_contract.py formatted/tests/
          python -m ruff check . > ruff-check.txt 2>&1
          python -m ruff format --check . > ruff-format.txt 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: formatted-lint-${{ github.run_id }}
          path: |
            formatted/
            ruff-check.txt
            ruff-format.txt
          if-no-files-found: error
