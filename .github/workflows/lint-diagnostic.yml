name: Lint diagnostic
on: [pull_request]
permissions: {contents: read}
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python -m pip install -e '.[dev]'
      - name: Capture Ruff diagnostics
        shell: bash
        run: |
          set +e
          python -m ruff check . --output-format=concise > ruff-check.txt 2>&1
          python -m ruff format --check . > ruff-format.txt 2>&1
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics-${{ github.run_id }}
          path: |
            ruff-check.txt
            ruff-format.txt
          if-no-files-found: error
