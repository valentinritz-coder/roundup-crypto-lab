name: Python CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: Install pinned Freqtrade for offline differential test
        run: |
          git clone --depth 1 --branch 2026.6 https://github.com/freqtrade/freqtrade.git .freqtrade-src
          test "$(git -C .freqtrade-src rev-parse HEAD)" = b604e2fd70539f7f73d3c62c16ce0b155bbab319
          python -m pip install -r .freqtrade-src/requirements.txt
          python -m pip install --no-deps -e .freqtrade-src
          python -m pip install --no-deps -e .freqtrade-src/ft_client
      - run: ruff check .
      - run: pytest -m native_differential
      - run: pytest
