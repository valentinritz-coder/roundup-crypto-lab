name: Apply active datetime serialization hotfix

on:
  push:
    branches: [fix/serialize-active-datetimes]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/serialize-active-datetimes
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply focused patch and regression test
        run: |
          python - <<'PY'
          from pathlib import Path

          module = Path('src/roundup_crypto_lab/freqtrade_active.py')
          text = module.read_text(encoding='utf-8')
          old = '''def _json(value: object) -> object:\n    if isinstance(value, Decimal):\n        return str(value)\n    raise TypeError(f"cannot serialize {type(value).__name__}")\n'''
          new = '''def _json(value: object) -> object:\n    if isinstance(value, Decimal):\n        return str(value)\n    if isinstance(value, datetime):\n        return value.isoformat()\n    raise TypeError(f"cannot serialize {type(value).__name__}")\n'''
          if old not in text:
              raise SystemExit('serializer block not found')
          module.write_text(text.replace(old, new), encoding='utf-8')

          Path('tests/test_freqtrade_active_serialization.py').write_text(
              '''import json\nfrom datetime import UTC, datetime\nfrom decimal import Decimal\n\nimport pytest\n\nfrom roundup_crypto_lab.freqtrade_active import _json\n\n\ndef test_json_serializer_supports_nested_datetime_and_decimal() -> None:\n    payload = {\n        "rows": [\n            {\n                "timestamp": datetime(2026, 7, 22, 19, 28, 22, tzinfo=UTC),\n                "amount": Decimal("40.00"),\n            }\n        ]\n    }\n\n    decoded = json.loads(json.dumps(payload, default=_json))\n\n    assert decoded == {\n        "rows": [\n            {\n                "timestamp": "2026-07-22T19:28:22+00:00",\n                "amount": "40.00",\n            }\n        ]\n    }\n\n\ndef test_json_serializer_rejects_unknown_types() -> None:\n    with pytest.raises(TypeError, match="cannot serialize object"):\n        _json(object())\n''',
              encoding='utf-8',
          )
          PY
      - name: Validate hotfix
        run: |
          python -m pip install -e '.[dev]'
          python -m ruff check src/roundup_crypto_lab/freqtrade_active.py tests/test_freqtrade_active_serialization.py
          python -m ruff format --check src/roundup_crypto_lab/freqtrade_active.py tests/test_freqtrade_active_serialization.py
          python -m pytest -q tests/test_freqtrade_active_serialization.py
      - name: Commit validated hotfix
        run: |
          rm .github/workflows/apply-active-datetime-hotfix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/roundup_crypto_lab/freqtrade_active.py tests/test_freqtrade_active_serialization.py .github/workflows/apply-active-datetime-hotfix.yml
          git commit -m 'Fix active result datetime serialization'
          git push origin HEAD:fix/serialize-active-datetimes
